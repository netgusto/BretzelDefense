name: Frontend CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jeu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: jeu/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test (Vitest)
        run: npm test

      - name: Build (Vite)
        run: npm run build
